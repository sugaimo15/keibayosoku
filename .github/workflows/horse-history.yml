name: Scrape horse history

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: "出馬表から対象馬を特定するrace_id (data/race_cardsに保存済みである必要あり)"
        required: true

permissions:
  contents: write

concurrency:
  group: daily-scrape-predict
  cancel-in-progress: false

jobs:
  scrape-horse-history:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Scrape horse history
        run: keibayosoku scrape-horse-history --race-id ${{ github.event.inputs.race_id }}

      - name: Upload debug HTML (only produced on selector mismatch)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-horse-history-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push data updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if [ -d debug/ ]; then git add debug/; fi
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Add horse history for race ${{ github.event.inputs.race_id }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
