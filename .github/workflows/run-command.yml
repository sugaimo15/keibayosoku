name: Run ad-hoc keibayosoku command

on:
  workflow_dispatch:
    inputs:
      command:
        description: "keibayosoku に渡す引数 (例: scrape-results --race-id 202602010911)"
        required: true

permissions:
  contents: write

concurrency:
  group: daily-scrape-predict
  cancel-in-progress: false

jobs:
  run-command:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run command
        env:
          KEIBAYOSOKU_ARGS: ${{ github.event.inputs.command }}
        run: keibayosoku $KEIBAYOSOKU_ARGS

      - name: Upload debug HTML (only produced on selector mismatch)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-run-command-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and push data updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if [ -d debug/ ]; then git add debug/; fi
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Run command: ${{ github.event.inputs.command }}"
            git push origin HEAD:${{ github.ref_name }}
          fi
